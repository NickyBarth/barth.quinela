
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.header{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.header p{font-size:14px;color:var(--color-text-secondary);margin-top:4px}
.hotel-tabs{display:flex;gap:8px;margin:1rem 0;flex-wrap:wrap}
.tab{padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-background-secondary);border-color:var(--color-border-primary);color:var(--color-text-primary);font-weight:500}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:1rem 0}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.day-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:10px;background:var(--color-background-primary)}
.day-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.day-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.day-date{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.day-total{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.day-rows{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.day-row{display:flex;flex-direction:column;gap:2px}
.row-label{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em}
.row-val{font-size:13px;color:var(--color-text-secondary)}
.row-val.highlight{color:var(--color-text-primary)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);margin-top:6px}
.badge-special{background:#EEEDFE;color:#3C3489}
.badge-note{background:#EAF3DE;color:#27500A}
.badge-warn{background:#FAEEDA;color:#633806}
.activities{margin-top:8px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;border-top:0.5px solid var(--color-border-tertiary);padding-top:8px}
.totals-section{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-top:1rem;background:var(--color-background-primary)}
.totals-title{font-size:16px;font-weight:500;margin-bottom:12px;color:var(--color-text-primary)}
.totals-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:14px}
.totals-row:last-child{border-bottom:none;font-weight:500;font-size:15px;margin-top:4px}
.note-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-top:10px;font-size:12px;color:var(--color-text-secondary);line-height:1.6}
</style>

<div class="header">
  <h1>NYC · Julio 29 – Agosto 7, 2026</h1>
  <p>Cronograma y presupuesto para 2 personas · 8 días turísticos</p>
</div>

<div class="hotel-tabs">
  <button class="tab active" onclick="setHotel(0)">Bergenline Ave / NJ</button>
  <button class="tab" onclick="setHotel(1)">Shefah Hotel / NJ</button>
  <button class="tab" onclick="setHotel(2)">La Quinta Brooklyn</button>
</div>

<div class="summary-grid" id="summary"></div>
<div id="days-container"></div>
<div class="totals-section" id="totals-section"></div>
<div class="note-box" id="notes-box"></div>

<script>

    foodDetail:["Sin comidas (es de madrugada)","Sin comidas (es de madrugada)","Sin comidas (es de madrugada)"]
  },
  {
    date:"Mié 30 Jul",title:"Día suave · Times Square · Ichiran",
    note:"Día suave post-vuelo. Times Square por la noche.",
    badge:null,
    transport:[16,16,12],
    food:[70,70,70],
    entry:[0,0,0],
    activities:"Bryant Park → NY Public Library (exterior) → Times Square → Ichiran Times Square (cena). Día tranquilo para aclimatarse.",
    transportDetail:["Bus NJ + Subway: ~$16.40 pareja","Bus NJ + Subway: ~$16.40 pareja","Subway OMNY: ~$12 pareja"],
    foodDetail:["Desayuno hotel/deli: $12 | Almuerzo food cart/bodega: $18 | Cena Ichiran (ramen): $40 → Total: ~$70","Igual que Bergenline","Igual"]
  },
  {
    date:"Jue 31 Jul",title:"Central Park Oeste · AMNH",
    note:"Museo American Natural History + zona oeste del parque",
    badge:"note",badgeText:"Entrada AMNH: $74 pareja",
    transport:[28,28,12],
    food:[50,50,50],
    entry:[74,74,74],
    activities:"American Museum of Natural History ($37/persona) → Central Park West → Belvedere Castle → The Ramble → Bow Bridge → Bethesda Terrace. Día completo.",
    transportDetail:["Bus NJ + 2 viajes subway: ~$28.40 pareja","Bus NJ + 2 viajes subway: ~$28.40 pareja","Subway OMNY (cap): ~$12 pareja"],
    foodDetail:["Desayuno: $12 | Almuerzo cerca del museo: $22 | Cena: $16 → Total: ~$50","Igual","Igual"]
  },
  {
    date:"Vie 1 Ago",title:"Brooklyn Bridge · DUMBO · Staten Island Ferry",
    note:"Día completo en Brooklyn + ferry gratuito a Staten Island",
    badge:"note",badgeText:"Ferry gratis",
    transport:[28,28,12],
    food:[50,50,50],
    entry:[0,0,0],
    activities:"DUMBO → Brooklyn Bridge Park → Pebble Beach → Heights Promenade → Cruzar Brooklyn Bridge → City Hall → Battery Park → Staten Island Ferry (gratis, vista de la Estatua de la Libertad).",
    transportDetail:["Bus NJ + subway: ~$28.40 pareja","Bus NJ + subway: ~$28.40 pareja","Subway: ~$12 pareja"],
    foodDetail:["Desayuno: $12 | Almuerzo DUMBO: $22 | Cena: $16 → Total: ~$50","Igual","Igual"]
  },
  {
    date:"Sáb 2 Ago",title:"BTS · MetLife Stadium",
    note:"Día 100% dedicado al concierto. Sin turismo.",
    badge:"special",badgeText:"BTS — 8:00 PM · Puertas 5:30 PM",
    transport:[85,85,100],
    food:[60,60,60],
    entry:[0,0,0],
    activities:"Salir ~4:00 PM desde el hotel. Port Authority → Coach USA 351 Meadowlands Express ($18 RT/persona) → MetLife Stadium. Regreso en Coach USA a Port Authority → Uber al hotel.",
    transportDetail:["Subway + Coach USA RT $36 + Uber regreso ~$49 → Total: ~$85","Igual que Bergenline","Subway a PA + Coach USA RT $36 + Uber PA→Brooklyn ~$64 → Total: ~$100"],
    foodDetail:["Desayuno/almuerzo en hotel/delivery: $20 | Comida en estadio/alrededores: $40 → Total: ~$60","Igual","Igual"]
  },

  },

    transport:[28,28,12],

    transportDetail:["Bus NJ + subway: ~$28.40 pareja","Igual","Subway OMNY: ~$12 pareja"],

  },
  {

    transportDetail:["Bus NJ + subway: ~$28.40 pareja","Igual","Subway OMNY: ~$12 pareja"],

  },
  {

  },
  {

    transport:[112,112,72],
    food:[15,15,15],
    entry:[0,0,0],
    activities:"Checkout. Uber/Lyft al aeropuerto LGA. Llegada a LGA ~8:00 AM para vuelo 10:00 AM.",
    transportDetail:["Uber hotel NJ → LGA: ~$112 pareja","Igual","Uber Brooklyn → LGA: ~$70 pareja"],
    foodDetail:["Café/desayuno rápido: $15 pareja","Igual","Igual"]
  }
];

let currentHotel=0;

function setHotel(idx){
  currentHotel=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  render();
}

function fmt(n){return '$'+Math.round(n).toLocaleString();}

function render(){
  const h=currentHotel;
  
  let totalTransport=0,totalFood=0,totalEntry=0;
  days.forEach(d=>{totalTransport+=d.transport[h];totalFood+=d.food[h];totalEntry+=d.entry[h];});
  const grandTotal=totalTransport+totalFood+totalEntry;
  const grandRange=[Math.round(grandTotal*0.9),Math.round(grandTotal*1.2)];

  document.getElementById('summary').innerHTML=`
    <div class="metric"><div class="metric-label">Transporte total</div><div class="metric-val">${fmt(totalTransport)}</div><div class="metric-sub">Para 2 personas</div></div>
    <div class="metric"><div class="metric-label">Comidas total</div><div class="metric-val">${fmt(totalFood)}</div><div class="metric-sub">Presupuesto moderado</div></div>
    <div class="metric"><div class="metric-label">Entradas (con Met)</div><div class="metric-val">${fmt(totalEntry)}</div><div class="metric-sub">AMNH + Met opcional</div></div>
    <div class="metric"><div class="metric-label">Estimado total</div><div class="metric-val">${fmt(grandRange[0])}–${fmt(grandRange[1])}</div><div class="metric-sub">Rango realista</div></div>
  `;

  let html='';
  days.forEach((d,i)=>{
    const t=d.transport[h],f=d.food[h],e=d.entry[h];
    const total=t+f+e;
    let badgeHtml='';
    if(d.badge==='special') badgeHtml=`<span class="badge badge-special">${d.badgeText}</span>`;
    else if(d.badge==='note') badgeHtml=`<span class="badge badge-note">${d.badgeText}</span>`;
    else if(d.badge==='warn') badgeHtml=`<span class="badge badge-warn">${d.badgeText}</span>`;

    html+=`<div class="day-card">
      <div class="day-header">
        <div>
          <div class="day-title">${d.title}</div>
          <div class="day-date">${d.date}</div>
          ${badgeHtml}
        </div>
        <div class="day-total">${total===0?'—':fmt(total)}</div>
      </div>
      <div class="day-rows">
        <div class="day-row">
          <span class="row-label">Transporte</span>
          <span class="row-val">${t===0?'—':fmt(t)}</span>
        </div>
        <div class="day-row">
          <span class="row-label">Comidas</span>
          <span class="row-val">${f===0?'—':fmt(f)}</span>
        </div>
        <div class="day-row">
          <span class="row-label">Entradas</span>
          <span class="row-val">${e===0?'Gratis':fmt(e)}</span>
        </div>
      </div>
      <div class="activities">${d.activities}<br><span style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px;display:block">${d.transportDetail[h]} · Comidas: ${d.foodDetail[h]}</span></div>
    </div>`;
  });
  document.getElementById('days-container').innerHTML=html;

  const entryNoMet=totalEntry-(h===2?60:0);
  const totalNoMet=totalTransport+totalFood+entryNoMet;

  document.getElementById('totals-section').innerHTML=`
    <div class="totals-title">Resumen de gastos — ${hotels[h].name}</div>
    <div class="totals-row"><span>Transporte (aeropuerto + turismo + BTS)</span><span>${fmt(totalTransport)}</span></div>
    <div class="totals-row"><span>Comidas (9 días, 2 personas)</span><span>${fmt(totalFood)}</span></div>
    <div class="totals-row"><span>AMNH (incluido)</span><span>$74</span></div>
    <div class="totals-row"><span>The Met (opcional, incluido arriba)</span><span>$60</span></div>
    <div class="totals-row"><span>Sin The Met</span><span>${fmt(totalNoMet)}</span></div>
    <div class="totals-row"><span>Con The Met</span><span>${fmt(totalTransport+totalFood+totalEntry)}</span></div>
    <div class="totals-row"><span style="color:var(--color-text-secondary);font-size:13px">Rango con margen de seguridad (+20%)</span><span style="color:var(--color-text-secondary);font-size:13px">${fmt((totalTransport+totalFood+totalEntry)*1.2)}</span></div>
  `;

  const notes=[
    "Los números de transporte en NJ usan Bus NJ ($6/trayecto) + Subway MTA ($3/viaje) para días turísticos. Para Brooklyn se aplica el cap OMNY de $35/semana por persona cuando aplica.",
    "Comidas calculadas para 2 personas. Desayunos: delis/bodegas ($10–14 pareja). Almuerzos: food trucks, bodegas o casual ($18–24 pareja). Cenas: restaurantes casuales ($14–20 pareja). Solo Ichiran es especial ($40 pareja).",
    "Entradas: AMNH es $37/persona ($74 pareja). The Met es $30/persona ($60 pareja) — marcada como opcional. Todos los demás lugares planeados son gratuitos.",
    h===2?"La Quinta Brooklyn es la opción más eficiente en transporte: la diferencia real es ~$150–200 vs NJ, que solo se justifica si el hotel en NJ es considerablemente más barato.":"Hospedaje en NJ: el transporte es más caro y complejo. Solo conviene si el hotel cuesta ~$150–200 menos que La Quinta Brooklyn en total."
  ];
  document.getElementById('notes-box').innerHTML=notes.map(n=>`<p style="margin-bottom:6px">· ${n}</p>`).join('');
}

render();
</script>
