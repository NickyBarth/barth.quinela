function cleanText(value) {
  return (value || '').toString().trim();
}

function sameText(a, b) {
  return cleanText(a).toLowerCase() === cleanText(b).toLowerCase();
}

function parseMatchDate(dateText) {
  const raw = cleanText(dateText).toLowerCase();

  const months = {
    ene: 1, enero: 1,
    feb: 2, febrero: 2,
    mar: 3, marzo: 3,
    abr: 4, abril: 4,
    may: 5, mayo: 5,
    jun: 6, junio: 6,
    jul: 7, julio: 7,
    ago: 8, agosto: 8,
    sep: 9, sept: 9, septiembre: 9, setiembre: 9,
    oct: 10, octubre: 10,
    nov: 11, noviembre: 11,
    dic: 12, diciembre: 12
  };

  // Soporta formatos como: "24 Jun", "24 de Jun", "24 Junio", "Jun 24"
  let match = raw.match(/(\d{1,2})\s*(?:de\s*)?([a-záéíóúñ]+)/i);
  if (!match) {
    match = raw.match(/([a-záéíóúñ]+)\s*(\d{1,2})/i);
    if (match) {
      const month = months[match[1].slice(0, 3)] || months[match[1]];
      const day = parseInt(match[2], 10);
      if (month && day) return {month, day};
    }
    return {month: 99, day: 99};
  }

  const day = parseInt(match[1], 10);
  const monthKey = match[2].slice(0, 3);
  const month = months[monthKey] || months[match[2]];

  if (!month || !day) return {month: 99, day: 99};
  return {month, day};
}

function matchSortValue(match) {
  const d = parseMatchDate(match.date);
  return d.month * 100 + d.day;
}

function sortedMatches(matches) {
  return (matches || []).slice().sort((a, b) => {
    const phaseDiff = getMatchPhase(a).order - getMatchPhase(b).order;
    if (phaseDiff !== 0) return phaseDiff;

    const bracketDiff = getBracketOrder(a) - getBracketOrder(b);
    if (bracketDiff !== 0 && (getBracketOrder(a) !== 999 || getBracketOrder(b) !== 999)) return bracketDiff;

    const dateDiff = matchSortValue(a) - matchSortValue(b);
    if (dateDiff !== 0) return dateDiff;

    const aId = cleanText(a.id).replace(/^m/, '');
    const bId = cleanText(b.id).replace(/^m/, '');
    const aNum = parseInt(aId, 10);
    const bNum = parseInt(bId, 10);

    if (!Number.isNaN(aNum) && !Number.isNaN(bNum)) return aNum - bNum;
    return cleanText(a.name).localeCompare(cleanText(b.name));
  });
}

function getMatchPhase(match) {
  const d = parseMatchDate(match.date);
  const value = d.month * 100 + d.day;

  if (value <= 627) return {key:'grupos', label:'Fase de Grupos', order:1};
  if (value >= 628 && value <= 703) return {key:'dieciseisavos', label:'Dieciseisavos de Final', order:2};
  if (value >= 704 && value <= 707) return {key:'octavos', label:'Octavos de Final', order:3};
  if (value >= 709 && value <= 711) return {key:'cuartos', label:'Cuartos de Final', order:4};
  if (value >= 714 && value <= 715) return {key:'semifinal', label:'Semifinal', order:5};
  if (value >= 718 && value <= 719) return {key:'final', label: value === 718 ? 'Tercer Puesto' : 'Final', order:6};
  return {key:'otros', label:'Otros partidos', order:99};
}

function normalizeTeamName(name) {
  return cleanText(name)
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\./g,'')
    .replace(/\s+/g,' ');
}

function flagForTeam(name) {
  const key = normalizeTeamName(name);
  return TEAM_FLAGS[key] || TEAM_FLAGS[key.replace(/^the\s+/, '')] || '▫️';
}

function formatTeam(name) {
  const clean = cleanText(name);
  if (!clean) return '<span class="bracket-team muted">Pendiente</span>';
  return `${flagForTeam(clean)} ${clean}`;
}

function getMatchTeams(name) {
  const parts = cleanText(name).split(/\s+vs\s+/i);
  if (parts.length !== 2) return {a: cleanText(name), b: ''};
  return {a: cleanText(parts[0]), b: cleanText(parts[1])};
}

function getMatchWinner(match) {
  if (!match || !match.done || !match.result) return '';
  const score = parseScore(match.result);
  const teams = getMatchTeams(match.name);
  if (!score || !teams.a || !teams.b) return '';
  if (score.a > score.b) return teams.a;
  if (score.b > score.a) return teams.b;
  return 'Empate';
}

function getMatchLoser(match) {
  if (!match || !match.done || !match.result) return '';
  const score = parseScore(match.result);
  const teams = getMatchTeams(match.name);
  if (!score || !teams.a || !teams.b) return '';
  if (score.a > score.b) return teams.b;
  if (score.b > score.a) return teams.a;
  return '';
}

function bracketCode(match) {
  return cleanText(match?.bracketCode || '').toUpperCase();
}

function getBracketOrder(match) {
  const code = bracketCode(match);
  if (BRACKET_SLOTS[code]) return BRACKET_SLOTS[code].order;
  return 999;
}

function findMatchByBracketCode(code) {
  const wanted = cleanText(code).toUpperCase();
  return (state.matches || []).find(m => bracketCode(m) === wanted);
}

function inferBracketCodeByTeams(match) {
  const teams = getMatchTeams(match.name);
  const a = normalizeTeamName(teams.a);
  const b = normalizeTeamName(teams.b);
  if (!a || !b) return '';

  for (const code in BRACKET_SLOTS) {
    const slot = BRACKET_SLOTS[code];
    if (slot.round !== 'r32') continue;
    const sa = normalizeTeamName(slot.teamA);
    const sb = normalizeTeamName(slot.teamB);
    if ((a === sa && b === sb) || (a === sb && b === sa)) return code;
  }
  return '';
}

function inferBracketCodesForAll() {
  if (!state || !state.matches) return;

  state.matches.forEach(m => {
    if (!m.bracketCode) {
      const inferred = inferBracketCodeByTeams(m);
      if (inferred) m.bracketCode = inferred;
    }
  });

  const used = new Set(state.matches.map(m => bracketCode(m)).filter(Boolean));
  const phaseSlotCodes = {};
  Object.keys(BRACKET_SLOTS).forEach(code => {
    const slot = BRACKET_SLOTS[code];
    if (!phaseSlotCodes[slot.phase]) phaseSlotCodes[slot.phase] = [];
    phaseSlotCodes[slot.phase].push(code);
  });
  Object.values(phaseSlotCodes).forEach(codes => codes.sort((a,b) => BRACKET_SLOTS[a].order - BRACKET_SLOTS[b].order));

  ['dieciseisavos','octavos','cuartos','semifinal','final'].forEach(phaseKey => {
    const available = (phaseSlotCodes[phaseKey] || []).filter(code => !used.has(code));
    const phaseMatches = (state.matches || [])
      .filter(m => getMatchPhase(m).key === phaseKey && !bracketCode(m))
      .sort((a,b) => matchSortValue(a) - matchSortValue(b));
    phaseMatches.forEach((m, i) => {
      if (available[i]) {
        m.bracketCode = available[i];
        used.add(available[i]);
      }
    });
  });
}

function resolveBracketParticipant(token) {
  const value = cleanText(token).toUpperCase();
  if (!value) return '';

  if (/^W\d+$/i.test(value)) {
    const sourceMatch = findMatchByBracketCode('P' + value.replace(/^W/i, ''));
    return getMatchWinner(sourceMatch) || value;
  }
  if (/^RU\d+$/i.test(value)) {
    const sourceMatch = findMatchByBracketCode('P' + value.replace(/^RU/i, ''));
    return getMatchLoser(sourceMatch) || value;
  }
  return token;
}

function displayBracketTeam(token) {
  const resolved = resolveBracketParticipant(token);
  if (/^(W|RU)\d+$/i.test(cleanText(resolved))) {
    return `<span class="bracket-team muted">${resolved}</span>`;
  }
  return formatTeam(resolved);
}

function isPhaseCollapsed(phaseKey) {
  const key = partidosView + ':' + phaseKey;
  if (phaseCollapsed[key] !== undefined) return phaseCollapsed[key];
  return partidosView === 'finalizados' && phaseKey === 'grupos';
}

function togglePhase(phaseKey) {
  const key = partidosView + ':' + phaseKey;
  phaseCollapsed[key] = !isPhaseCollapsed(phaseKey);
  renderPartidos();
}


function parseScore(score) {
  const parts = cleanText(score).split('-').map(x => parseInt(x, 10));
  if (parts.length !== 2 || Number.isNaN(parts[0]) || Number.isNaN(parts[1])) return null;
  return {a: parts[0], b: parts[1]};
}

function outcome(score) {
  const s = parseScore(score);
  if (!s) return '';
  if (s.a > s.b) return 'A';
  if (s.a < s.b) return 'B';
  return 'D';
}

function winnerHit(predScore, realScore) {
  const predOutcome = outcome(predScore);
  const realOutcome = outcome(realScore);
  return !!(predOutcome && realOutcome && predOutcome === realOutcome);
}

function minuteHit(predMinuto, realMinuto) {
  const pred = parseInt(cleanText(predMinuto), 10);
  const real = parseInt(cleanText(realMinuto), 10);
  if (Number.isNaN(pred) || Number.isNaN(real)) return false;
  return Math.abs(pred - real) <= 1;
}


function ensureStateShape() {
  if (!state.matches) state.matches = [];
  inferBracketCodesForAll();
  state.matches = sortedMatches(state.matches);
  if (!state.predictions) state.predictions = {};
  PLAYERS.forEach(p => {
    if (!state.predictions[p]) state.predictions[p] = {};
  });
  if (!state.generalPredictions) state.generalPredictions = {};
  if (!state.generalResults) state.generalResults = {};
  ['campeon','subcampeon','goleador','asistencias','sorpresa'].forEach(k => {
    if (state.generalResults[k] === undefined) state.generalResults[k] = '';
  });
  if (!state.premio) state.premio = 'Por definir';
}

function generalComplete(gp) {
  return !!(gp && cleanText(gp.campeon) && cleanText(gp.subcampeon) && cleanText(gp.goleador) && cleanText(gp.asistencias) && cleanText(gp.sorpresa));
}

function generalHit(player, key) {
  const gp = (state.generalPredictions || {})[player] || {};
  const gr = state.generalResults || {};
  return !!(cleanText(gp[key]) && cleanText(gr[key]) && sameText(gp[key], gr[key]));
}

function generalValue(player, key) {
  const gp = (state.generalPredictions || {})[player] || {};
  return cleanText(gp[key]) || '—';

function resultBadge(player, key, pts) {

async function loadState() {
  const ref = doc(db, "quiniela", "estado");

  const snap = await getDoc(ref);

  if (snap.exists()) {
    state = snap.data();
    ensureStateShape();
  } else {
    state = JSON.parse(JSON.stringify(SEED));
    ensureStateShape();
    await setDoc(ref, state);
  }

  try {
    currentPlayer = localStorage.getItem('quiniela_player') || '';

    if (currentPlayer) {
      document.getElementById('player-select').value = currentPlayer;

  } catch(e) {}

  renderRanking();
  renderPartidos();
  renderClasificacion();
}

function calcPoints() {
  ensureStateShape();
  const pts = {Faride:0,Francisco:0,Nicole:0,Steven:0};

  state.matches.forEach(m => {
    if (!m.done || !m.result) return;
    PLAYERS.forEach(p => {
      const pred = (state.predictions[p]||{})[m.id];
      if (!pred) return;

      if (cleanText(pred.score) === cleanText(m.result)) pts[p] += 3;
      if (winnerHit(pred.score, m.result)) pts[p] += 1;
      if (m.extraActive && cleanText(m.extraMinuto) && cleanText(pred.minuto) && minuteHit(pred.minuto, m.extraMinuto)) pts[p] += 1;
      if (m.extraActive && cleanText(m.extraJugador) && cleanText(pred.jugador) && sameText(pred.jugador, m.extraJugador)) pts[p] += 1;
    });
  });

  const gr = state.generalResults || {};
  PLAYERS.forEach(p => {
    const gp = (state.generalPredictions || {})[p] || {};
    if (cleanText(gp.campeon) && cleanText(gr.campeon) && sameText(gp.campeon, gr.campeon)) pts[p] += 10;
    if (cleanText(gp.subcampeon) && cleanText(gr.subcampeon) && sameText(gp.subcampeon, gr.subcampeon)) pts[p] += 5;
    if (cleanText(gp.goleador) && cleanText(gr.goleador) && sameText(gp.goleador, gr.goleador)) pts[p] += 5;
    if (cleanText(gp.asistencias) && cleanText(gr.asistencias) && sameText(gp.asistencias, gr.asistencias)) pts[p] += 5;
    if (cleanText(gp.sorpresa) && cleanText(gr.sorpresa) && sameText(gp.sorpresa, gr.sorpresa)) pts[p] += 5;
  });

  return pts;
}

function renderPartidos() {
  ensureStateShape();

  const orderedMatches = sortedMatches(state.matches);
  const pendingCount = orderedMatches.filter(m => !m.done).length;
  const doneCount = orderedMatches.filter(m => m.done).length;

  let html = `<div class="match-filter-tabs">
    <button class="match-filter-tab ${partidosView === 'pendientes' ? 'active' : ''}" onclick="setPartidosView('pendientes')">Pendientes (${pendingCount})</button>
    <button class="match-filter-tab ${partidosView === 'finalizados' ? 'active' : ''}" onclick="setPartidosView('finalizados')">Finalizados (${doneCount})</button>
  </div>`;

  if (!state.matches.length) {
    document.getElementById('partidos-list').innerHTML = html + '<div class="empty-state">No hay partidos aún. Agrégalos desde Admin.</div>';
    return;
  }

  const visibleMatches = orderedMatches.filter(m => {
    if (partidosView === 'pendientes') return !m.done;
    if (partidosView === 'finalizados') return m.done;
    return true;
  });

  if (!visibleMatches.length) {
    document.getElementById('partidos-list').innerHTML = html + `<div class="empty-state">${partidosView === 'pendientes' ? 'No hay partidos pendientes' : 'No hay partidos finalizados'}</div>`;
    return;
  }

  const groups = [];
  visibleMatches.forEach(m => {
    const phase = getMatchPhase(m);
    let group = groups.find(g => g.key === phase.key);
    if (!group) {
      group = {key: phase.key, label: phase.label, order: phase.order, matches: []};
      groups.push(group);
    }
    group.matches.push(m);
  });
  groups.sort((a,b) => a.order - b.order);

  groups.forEach(group => {
    const collapsed = isPhaseCollapsed(group.key);
    html += `<button class="phase-toggle" onclick="togglePhase('${group.key}')">
      <span>${collapsed ? '▶' : '▼'} ${group.label}</span>
      <span class="phase-count">${group.matches.length} partido${group.matches.length===1?'':'s'}</span>
    </button>`;

    if (collapsed) {
      html += `<div class="phase-collapsed-note">Toca ${group.label} para desplegar los partidos</div>`;
      return;
    }

    let lastDate = '';

    group.matches.forEach(m => {
      if (m.date !== lastDate) {
        html += `<div class="group-label">${m.date}</div>`;
        lastDate = m.date;
      }

      let predsHtml = '';

      PLAYERS.forEach(p => {
        const pred = (state.predictions[p]||{})[m.id];
        const scoreHit = m.done && pred && cleanText(pred.score) === cleanText(m.result);
        const winnerOnlyHit = m.done && pred && winnerHit(pred.score, m.result);
        const minutoHit = m.done && pred && m.extraActive && cleanText(m.extraMinuto) && cleanText(pred.minuto) && minuteHit(pred.minuto, m.extraMinuto);
        const jugadorHit = m.done && pred && m.extraActive && cleanText(m.extraJugador) && cleanText(pred.jugador) && sameText(pred.jugador, m.extraJugador);

        let extraHtml = '';
        if (m.extraActive && pred) {
          if (cleanText(pred.minuto)) {
            extraHtml += `<div class="pred-extra ${minutoHit ? 'pred-extra-hit' : ''}">${minutoHit ? '✅ +1 ' : ''}⏱ min ${cleanText(pred.minuto)}</div>`;
          }
          if (cleanText(pred.jugador)) {
            extraHtml += `<div class="pred-extra ${jugadorHit ? 'pred-extra-hit' : ''}">${jugadorHit ? '✅ +1 ' : ''}⚽ ${cleanText(pred.jugador)}</div>`;
          }
        }

        predsHtml += `<div class="pred-item ${scoreHit?'pred-hit':''}">
          <div class="pred-name">${p}</div>
          <div class="pred-score">${pred?cleanText(pred.score):'—'} ${scoreHit ? '✅ +3' : ''} ${winnerOnlyHit ? '✅ +1 ganador' : ''}</div>
          ${extraHtml}
        </div>`;
      });

      html += `<div class="match-card">
        <div class="match-header">
          <div class="match-title">${m.bracketCode ? `<span style="color:#0F6E56;font-weight:800;">${bracketCode(m)}</span> · ` : ''}${m.name}</div>
          <span class="match-status ${m.done?'status-done':'status-upcoming'}">${m.done?'Finalizado':'Pendiente'}</span>
        </div>
        <div class="predictions-grid">${predsHtml}</div>
        ${m.done&&m.result?`<div class="result-row"><span class="result-label">Resultado final:</span><span class="result-score">${m.result}</span></div>`:''}
        ${m.done&&m.extraActive&&(m.extraMinuto||m.extraJugador)?`<div class="result-row"><span class="result-label">Extras reales:</span><span class="result-score">${m.extraMinuto?`⏱ ${m.extraMinuto}`:''} ${m.extraJugador?`⚽ ${m.extraJugador}`:''}</span></div>`:''}
      </div>`;
    });
  });

  document.getElementById('partidos-list').innerHTML = html;
}


function renderBracketCard(code, variant='normal') {
  const slot = BRACKET_SLOTS[code];
  const match = findMatchByBracketCode(code);
  const teamA = match ? getMatchTeams(match.name).a : slot.teamA;
  const teamB = match ? getMatchTeams(match.name).b : slot.teamB;
  const winner = match ? getMatchWinner(match) : '';
  const date = match ? cleanText(match.date) : slot.date;
  const time = slot.time || '';
  const title = code === 'P103' ? 'Tercer puesto' : (code === 'P104' ? 'Final' : '');

  return `<div class="bracket-card ${match ? '' : 'placeholder'} ${variant}">
    <div class="bracket-date"><span>${date}</span><span>${time}</span></div>
    ${title ? `<div class="bracket-section-label">${title}</div>` : ''}
    <div class="bracket-team">${displayBracketTeam(teamA)}</div>
    <div class="bracket-team">${displayBracketTeam(teamB)}</div>
    ${match && match.done && match.result ? `<div class="bracket-result">${cleanText(match.result)}</div>` : `<div class="bracket-result" style="color:#aaa;">Pendiente</div>`}
    ${winner && winner !== 'Empate' ? `<div class="bracket-winner">Clasifica: ${formatTeam(winner)}</div>` : ''}
    <div class="bracket-code">${code}</div>
  </div>`;
}

function renderBracketColumn(title, codes, spacerClass='') {
  let html = `<div class="bracket-column"><div class="bracket-title">${title}</div>`;
  codes.forEach((code, idx) => {
    if (spacerClass && idx > 0) html += `<div class="${spacerClass}"></div>`;
    html += renderBracketCard(code);
  });
  html += '</div>';
  return html;
}

function renderClasificacion() {
  ensureStateShape();

  let html = `<div class="classification-scroll"><div class="bracket-board">
    ${renderBracketColumn('Dieciseisavos', ['P74','P77','P73','P75','P83','P84','P81','P82'])}
    ${renderBracketColumn('Octavos', ['P89','P90','P93','P94'], 'bracket-spacer-sm')}
    ${renderBracketColumn('Cuartos', ['P97','P98'], 'bracket-spacer-lg')}
    ${renderBracketColumn('Semifinal', ['P101'], '')}
    <div class="bracket-column bracket-center"><div class="bracket-title">Final</div>
      ${renderBracketCard('P104', 'final')}
      <div class="bracket-spacer-md"></div>
      ${renderBracketCard('P103', 'third')}
    </div>
    ${renderBracketColumn('Semifinal', ['P102'], '')}
    ${renderBracketColumn('Cuartos', ['P99','P100'], 'bracket-spacer-lg')}
    ${renderBracketColumn('Octavos', ['P91','P92','P95','P96'], 'bracket-spacer-sm')}
    ${renderBracketColumn('Dieciseisavos', ['P76','P78','P79','P80','P86','P88','P85','P87'])}
  </div></div>
  <div class="bracket-help">Si un partido aparece en una posición incorrecta, corrige su <b>Código de llave</b> desde Admin.</div>`;

  document.getElementById('clasificacion-list').innerHTML = html;
}

function renderPredecir() {
  currentPlayer = document.getElementById('player-select').value;
  if (!currentPlayer) { document.getElementById('predecir-list').innerHTML = '<div class="empty-state">Selecciona tu nombre arriba</div>'; return; }
  ensureStateShape();
  const myPreds = state.predictions[currentPlayer]||{};
  const pending = sortedMatches(state.matches).filter(m=>!m.done);
  let html = buildGeneralPredictionsBlock(currentPlayer);
  if (!pending.length) { html += '<div class="empty-state">No hay partidos pendientes por predecir</div>'; }
  else {
    let lastPhase = '';
    let lastDate = '';
    pending.forEach(m => {
      const phase = getMatchPhase(m);
      if (phase.label !== lastPhase) { html+=`<div class="phase-label">${phase.label}</div>`; lastPhase=phase.label; lastDate=''; }
      if (m.date!==lastDate) { html+=`<div class="group-label">${m.date}</div>`; lastDate=m.date; }
      const already = myPreds[m.id];
      if (already) {
        let extraHtml = '';
        if (already.minuto) extraHtml += `<span class="tag tag-blue">⏱ min ${already.minuto}</span>`;
        if (already.jugador) extraHtml += `<span class="tag tag-blue">⚽ ${already.jugador}</span>`;
        html += `<div class="match-card">
          <div class="match-header"><div class="match-title">${m.name}</div><span class="match-status status-done">Guardado ✓</span></div>
          <div style="margin-top:0.5rem;"><span class="tag tag-green" style="font-size:14px;padding:5px 14px;">${already.score}</span>${extraHtml}</div>
          <div style="font-size:11px;color:#bbb;margin-top:8px;">Ya no puedes editar tu predicción</div>
        </div>`;
      } else {
        html += `<div class="match-card">
          <div class="match-header"><div class="match-title">${m.name}</div></div>
          <div class="form-group" style="margin-top:0.75rem;">
            <label class="form-label">Marcador</label>
            <div class="form-row">
              <input type="number" min="0" max="20" class="score-input" id="sa-${m.id}" placeholder="0">
              <span class="score-sep">—</span>
              <input type="number" min="0" max="20" class="score-input" id="sb-${m.id}" placeholder="0">
            </div>
          </div>
          ${m.extraActive?`<div class="extra-section">
            <div class="extra-title">⭐ Puntos extra (opcional)</div>
            <div class="form-group"><label class="form-label">Minuto del primer gol</label><input type="number" min="1" max="120" id="em-${m.id}" placeholder="ej: 28"></div>
            <div class="form-group" style="margin-bottom:0;"><label class="form-label">Jugador que anota primero</label><input type="text" id="ej-${m.id}" placeholder="ej: Haaland"></div>
          </div>`:''}
          <button class="btn-primary" onclick="submitPred('${m.id}')">Guardar predicción</button>
        </div>`;
      }
    });
  }
  document.getElementById('predecir-list').innerHTML = html;
}

function submitPred(matchId) {
  const a = document.getElementById('sa-'+matchId);
  const b = document.getElementById('sb-'+matchId);
  if (!a||!b||a.value===''||b.value==='') { showToast('Ingresa el marcador completo'); return; }
  const score = `${a.value}-${b.value}`;
  const minEl = document.getElementById('em-'+matchId);
  const jugEl = document.getElementById('ej-'+matchId);
  if (!state.predictions[currentPlayer]) state.predictions[currentPlayer]={};
  state.predictions[currentPlayer][matchId] = {score, minuto:minEl?minEl.value.trim():'', jugador:jugEl?jugEl.value.trim():''};
  saveState();
  showToast('¡Predicción guardada!');
  renderPredecir(); renderPartidos(); renderRanking();
}

function renderAdminMatchSelect() {
  const sel = document.getElementById('admin-match-select');
  sel.innerHTML = '<option value="">Elige un partido...</option>';
  sortedMatches(state.matches).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = `${m.name} (${m.date})${m.done?' ✓':''}`;
    sel.appendChild(opt);
  });
}

function renderAdminMatch() {
  const matchId = document.getElementById('admin-match-select').value;
  const el = document.getElementById('admin-match-detail');
  if (!matchId) { el.innerHTML=''; return; }
  const m = state.matches.find(x=>x.id===matchId);
  el.innerHTML = `<div style="margin-top:1rem;">
    <div style="font-size:13px;font-weight:600;margin-bottom:0.75rem;color:#1a1a1a;">${m.name}</div>
    <div class="form-group"><label class="form-label">Nombre del partido</label><input type="text" id="adm-name" value="${m.name||''}" placeholder="Ej: Brasil vs España"></div>
    <div class="form-group"><label class="form-label">Fecha</label><input type="text" id="adm-date" value="${m.date||''}" placeholder="Ej: 29 Jun"></div>
    <div class="form-group"><label class="form-label">Código de llave</label><input type="text" id="adm-bracket-code" value="${m.bracketCode||''}" placeholder="Ej: P74"><div style="font-size:11px;color:#999;margin-top:5px;">Usa P74, P75, P89, P104, etc. para ubicar el partido en la llave.</div></div>
    <button class="btn-primary" style="background:#185FA5;margin-bottom:0.75rem;" onclick="saveAdminMatchInfo('${matchId}')">Guardar nombre / fecha / código</button>
    <div class="form-group"><label class="form-label">Resultado final</label>
      <div class="form-row">
        <input type="number" min="0" max="20" class="score-input" id="adm-a" value="${m.result?m.result.split('-')[0]:''}" placeholder="0">
        <span class="score-sep">—</span>
        <input type="number" min="0" max="20" class="score-input" id="adm-b" value="${m.result?m.result.split('-')[1]:''}" placeholder="0">
      </div>
    </div>
    <div class="form-group"><label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="adm-extra" ${m.extraActive?'checked':''} onchange="toggleAdminExtra()">
      <span>Activar puntos extra para este partido</span>
    </label></div>
    <div id="adm-extra-fields" style="${m.extraActive?'':'display:none;'}">
      <div class="extra-section">
        <div class="extra-title">Puntos extra</div>
        <div class="form-group"><label class="form-label">Minuto del primer gol</label><input type="text" id="adm-minuto" value="${m.extraMinuto||''}" placeholder="ej: 28"></div>
        <div class="form-group" style="margin-bottom:0;"><label class="form-label">Jugador que anotó primero</label><input type="text" id="adm-jugador" value="${m.extraJugador||''}" placeholder="ej: Haaland"></div>
      </div>
    </div>
    <button class="btn-primary" onclick="saveAdminMatch('${matchId}')">Guardar resultado</button>
<button 
  class="btn-primary" 
  style="background:#d9534f;margin-top:0.5rem;" 
  onclick="deleteMatch('${matchId}')">
  Eliminar partido
</button>
  </div>`;
}

function toggleAdminExtra() {
  document.getElementById('adm-extra-fields').style.display = document.getElementById('adm-extra').checked?'':'none';
}


async function saveAdminMatchInfo(matchId) {
  const m = state.matches.find(x=>x.id===matchId);
  if (!m) return;

  const newName = cleanText(document.getElementById('adm-name')?.value);
  const newDate = cleanText(document.getElementById('adm-date')?.value);
  const newCode = cleanText(document.getElementById('adm-bracket-code')?.value).toUpperCase();

  if (!newName || !newDate) {
    showToast('Ingresa nombre y fecha');
    return;
  }
  if (newCode && !BRACKET_SLOTS[newCode]) {
    showToast('Código de llave inválido');
    return;
  }

  m.name = newName;
  m.date = newDate;
  m.bracketCode = newCode;
  state.matches = sortedMatches(state.matches);

  await saveState();
  showToast('Partido actualizado');
  renderPartidos();
  renderPredecir();
  renderClasificacion();
  renderAdminMatchSelect();

  document.getElementById('admin-match-select').value = matchId;
  renderAdminMatch();
}

function saveAdminMatch(matchId) {
  const a = document.getElementById('adm-a').value;
  const b = document.getElementById('adm-b').value;
  if (a===''||b==='') { showToast('Ingresa el resultado'); return; }
  const m = state.matches.find(x=>x.id===matchId);
  m.result=`${a}-${b}`; m.done=true;
  m.extraActive=document.getElementById('adm-extra').checked;
  m.extraMinuto=document.getElementById('adm-minuto')?document.getElementById('adm-minuto').value.trim():'';
  m.extraJugador=document.getElementById('adm-jugador')?document.getElementById('adm-jugador').value.trim():'';
  state.matches = sortedMatches(state.matches);
  saveState();
  showToast('¡Resultado guardado!');
  renderRanking(); renderPartidos(); renderClasificacion(); renderAdminMatchSelect();
}

function addMatch() {
  const name = document.getElementById('new-match-name').value.trim();
  const date = document.getElementById('new-match-date').value.trim();
  if (!name||!date) { showToast('Ingresa nombre y fecha'); return; }
  const newMatch = {id:'m'+Date.now(),name,date,done:false,result:'',extraActive:true,extraMinuto:'',extraJugador:''};
  newMatch.bracketCode = inferBracketCodeByTeams(newMatch);
  state.matches.push(newMatch);
  inferBracketCodesForAll();
  state.matches = sortedMatches(state.matches);
  saveState();
  document.getElementById('new-match-name').value='';
  document.getElementById('new-match-date').value='';
  showToast('¡Partido agregado!');
  renderPartidos(); renderPredecir(); renderClasificacion(); renderAdminMatchSelect();
}

function setPartidosView(view) {
  partidosView = view;
  renderPartidos();
}

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab')[['ranking','partidos','clasificacion','predecir','admin'].indexOf(tab)].classList.add('active');
  if (tab==='ranking') renderRanking();
  if (tab==='partidos') renderPartidos();
  if (tab==='clasificacion') renderClasificacion();
  if (tab==='predecir') renderPredecir();
  if (tab==='admin') { renderAdminMatchSelect(); renderAdminGeneral(); document.getElementById('admin-match-detail').innerHTML=''; }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function saveGeneralPredictions() {
  ensureStateShape();
  currentPlayer = document.getElementById('player-select').value;

  if (!currentPlayer) {
    showToast('Selecciona tu nombre primero');
    return;
  }

  const values = {
    campeon: cleanText(document.getElementById('gp-campeon')?.value),
    subcampeon: cleanText(document.getElementById('gp-subcampeon')?.value),
    goleador: cleanText(document.getElementById('gp-goleador')?.value),
    asistencias: cleanText(document.getElementById('gp-asistencias')?.value),
    sorpresa: cleanText(document.getElementById('gp-sorpresa')?.value)
  };

  if (!values.campeon || !values.subcampeon || !values.goleador || !values.asistencias || !values.sorpresa) {
    showToast('Completa todas las predicciones generales');
    return;
  }

  if (!state.generalPredictions) state.generalPredictions = {};
  state.generalPredictions[currentPlayer] = values;

  await saveState();
  showToast('Predicciones generales guardadas');
  renderPredecir();
  renderRanking();
}

function renderAdminGeneral() {
  ensureStateShape();
  const gr = state.generalResults || {};

  const premio = document.getElementById('admin-premio');
  if (!premio) return;

  premio.value = cleanText(state.premio) || 'Por definir';
  document.getElementById('admin-gr-campeon').value = cleanText(gr.campeon);
  document.getElementById('admin-gr-subcampeon').value = cleanText(gr.subcampeon);
  document.getElementById('admin-gr-goleador').value = cleanText(gr.goleador);
  document.getElementById('admin-gr-asistencias').value = cleanText(gr.asistencias);
  document.getElementById('admin-gr-sorpresa').value = cleanText(gr.sorpresa);
}

async function saveAdminGeneral() {
  ensureStateShape();

  state.premio = cleanText(document.getElementById('admin-premio').value) || 'Por definir';
  state.generalResults = {
    campeon: cleanText(document.getElementById('admin-gr-campeon').value),
    subcampeon: cleanText(document.getElementById('admin-gr-subcampeon').value),
    goleador: cleanText(document.getElementById('admin-gr-goleador').value),
    asistencias: cleanText(document.getElementById('admin-gr-asistencias').value),
    sorpresa: cleanText(document.getElementById('admin-gr-sorpresa').value)
  };

  await saveState();
  showToast('Generales / Premio guardados');
  renderRanking();
  renderAdminGeneral();
}

async function deleteMatch(matchId) {

  const confirmDelete = confirm(
    '¿Seguro que quieres eliminar este partido?'
  );

  if (!confirmDelete) return;

  // eliminar partido
  state.matches = state.matches.filter(
    m => m.id !== matchId
  );

  // eliminar predicciones relacionadas
  PLAYERS.forEach(player => {
    if (
      state.predictions[player] &&
      state.predictions[player][matchId]
    ) {
      delete state.predictions[player][matchId];
    }
  });

  await saveState();

  showToast('Partido eliminado');

  renderPartidos();
  renderRanking();
  renderPredecir();
  renderClasificacion();
  renderAdminMatchSelect();

  document.getElementById(
    'admin-match-detail'
  ).innerHTML = '';
}
window.showTab = showTab;
window.submitPred = submitPred;
window.savePlayer = savePlayer;
window.renderPredecir = renderPredecir;
window.renderAdminMatch = renderAdminMatch;
window.toggleAdminExtra = toggleAdminExtra;
window.saveAdminMatch = saveAdminMatch;
window.saveAdminMatchInfo = saveAdminMatchInfo;
window.addMatch = addMatch;
window.deleteMatch = deleteMatch;
window.setPartidosView = setPartidosView;
window.togglePhase = togglePhase;
window.saveGeneralPredictions = saveGeneralPredictions;
window.saveAdminGeneral = saveAdminGeneral;
window.renderClasificacion = renderClasificacion;

loadState().then(() => {
  listenRealtime();
  renderPredecir();
  renderClasificacion();
  renderAdminMatchSelect();
  renderAdminGeneral();
});

</script>
</body>
</html>
