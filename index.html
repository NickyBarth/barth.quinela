<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Barth — Mundial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.app { max-width: 420px; margin: 0 auto; padding: 0 0 4rem; }
.header { padding: 1.25rem 1rem 0; display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.header-icon { width: 38px; height: 38px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; }
.header-title { font-size: 17px; font-weight: 600; color: #1a1a1a; }
.header-sub { font-size: 12px; color: #888; }
.tab-bar { display: flex; border-bottom: 1px solid #e5e5e0; background: #fff; position: sticky; top: 0; z-index: 10; }
.tab { flex: 1; padding: 12px 4px; font-size: 12px; background: none; border: none; cursor: pointer; color: #888; font-weight: 400; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: #1D9E75; font-weight: 600; border-bottom: 2px solid #1D9E75; }
.section { padding: 1rem; display: none; }
.section.active { display: block; }
.card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.ranking-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f0f0ec; }
.ranking-item:last-child { border-bottom: none; }
.rank-num { font-size: 20px; width: 30px; }
.rank-name { flex: 1; font-size: 15px; font-weight: 500; color: #1a1a1a; }
.rank-pts { font-size: 22px; font-weight: 600; color: #0F6E56; }
.rank-pts-label { font-size: 11px; color: #aaa; }
.avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.match-card { background: #fff; border: 1px solid #ebebeb; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
.match-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.match-status { font-size: 11px; padding: 3px 9px; border-radius: 20px; }
.status-upcoming { background: #E6F1FB; color: #185FA5; }
.status-done { background: #f0f0ec; color: #666; }
.predictions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0.5rem; }
.pred-item { background: #f8f8f5; border-radius: 10px; padding: 8px 10px; font-size: 13px; }
.pred-name { color: #999; font-size: 11px; margin-bottom: 2px; }
.pred-score { font-weight: 600; color: #1a1a1a; }
.pred-hit { background: #E1F5EE; }
.pred-hit .pred-score { color: #0F6E56; }
.pred-extra { font-size: 11px; color: #185FA5; margin-top: 2px; }
.result-row { display: flex; align-items: center; gap: 8px; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #f0f0ec; }
.result-label { font-size: 12px; color: #999; }
.result-score { font-size: 15px; font-weight: 600; color: #1D9E75; }
.form-group { margin-bottom: 1rem; }
.form-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
.form-row { display: flex; gap: 8px; align-items: center; }
.score-input { width: 56px; text-align: center; font-size: 18px; font-weight: 600; padding: 10px 6px; border: 1px solid #ddd; border-radius: 10px; background: #fff; color: #1a1a1a; }
.score-sep { font-size: 20px; color: #bbb; font-weight: 500; }
.btn-primary { background: #1D9E75; color: white; width: 100%; padding: 12px; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; border: none; margin-top: 0.5rem; }
.btn-primary:hover { background: #0F6E56; }
.extra-section { margin-top: 0.75rem; padding: 0.75rem; background: #f0f6ff; border-radius: 10px; }
.extra-title { font-size: 12px; font-weight: 600; color: #185FA5; margin-bottom: 0.5rem; }
select, input[type="text"], input[type="number"] { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; font-size: 14px; }
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin-right: 4px; margin-top: 4px; }
.tag-green { background: #E1F5EE; color: #0F6E56; font-weight: 600; }
.tag-blue { background: #E6F1FB; color: #185FA5; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1D9E75; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.empty-state { text-align: center; padding: 2rem 1rem; color: #aaa; font-size: 14px; }
.group-label { font-size: 11px; font-weight: 600; color: #bbb; letter-spacing: 0.06em; text-transform: uppercase; margin: 1.25rem 0 0.5rem; }

.general-list { font-size: 11px; color: #666; margin-top: 6px; line-height: 1.45; }
.general-hit { color: #0F6E56; font-weight: 600; }
.points-box { font-size: 12px; color: #555; line-height: 1.6; }
.points-title { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 0.5rem; }
.pred-extra-hit { background: #E1F5EE; color: #0F6E56; font-weight: 700; border-radius: 7px; padding: 2px 6px; display: inline-block; }
.general-saved { background:#E1F5EE; color:#0F6E56; border-radius:10px; padding:10px; font-size:12px; line-height:1.5; }


.match-filter-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.match-filter-tab { flex: 1; padding: 10px 8px; border-radius: 10px; border: 1px solid #e5e5e0; background: #fff; color: #777; font-size: 13px; font-weight: 600; cursor: pointer; }
.match-filter-tab.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }

</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <i class="ti ti-trophy" style="font-size:20px;color:#0F6E56;"></i>
    </div>
    <div>
      <div class="header-title">Quiniela Barth</div>
      <div class="header-sub">Mundial 2026</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('ranking')">Ranking</button>
    <button class="tab" onclick="showTab('partidos')">Partidos</button>
    <button class="tab" onclick="showTab('predecir')">Mis predicciones</button>
    <button class="tab" onclick="showTab('admin')">Admin</button>
  </div>

  <div id="tab-ranking" class="section active">
    <div class="card" id="ranking-list"><div class="empty-state">Cargando...</div></div>
  </div>

  <div id="tab-partidos" class="section">
    <div id="partidos-list"></div>
  </div>

  <div id="tab-predecir" class="section">
    <div class="card" style="margin-bottom:1rem;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label">¿Quién eres?</label>
        <select id="player-select" onchange="savePlayer();renderPredecir();">
          <option value="">Selecciona tu nombre</option>
          <option value="Faride">Faride</option>
          <option value="Francisco">Francisco</option>
          <option value="Nicole">Nicole</option>
          <option value="Steven">Steven</option>
        </select>
      </div>
    </div>
    <div id="predecir-list"></div>
  </div>

  <div id="tab-admin" class="section">
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#1a1a1a;">Marcar resultado</div>
      <div class="form-group">
        <label class="form-label">Selecciona un partido</label>
        <select id="admin-match-select" onchange="renderAdminMatch()">
          <option value="">Elige un partido...</option>
        </select>
      </div>
      <div id="admin-match-detail"></div>
    </div>
    <div class="card" style="margin-top:1rem;">
      <div style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#1a1a1a;">Agregar partido</div>
      <div class="form-group">
        <label class="form-label">Partido (ej: Brasil vs España)</label>
        <input type="text" id="new-match-name" placeholder="Equipo A vs Equipo B">
      </div>
      <div class="form-group">
        <label class="form-label">Fecha (ej: 17 Jun)</label>
        <input type="text" id="new-match-date" placeholder="17 Jun">
      </div>
      <button class="btn-primary" onclick="addMatch()">Agregar partido</button>
    </div>

    <div class="card" style="margin-top:1rem;">
      <div style="font-size:14px;font-weight:600;margin-bottom:1rem;color:#1a1a1a;">Predicciones Generales / Premio</div>
      <div class="form-group">
        <label class="form-label">Premio</label>
        <input type="text" id="admin-premio" placeholder="Por definir">
      </div>
      <div class="form-group">
        <label class="form-label">Campeón real</label>
        <input type="text" id="admin-gr-campeon" placeholder="Ej: Argentina">
      </div>
      <div class="form-group">
        <label class="form-label">Subcampeón real</label>
        <input type="text" id="admin-gr-subcampeon" placeholder="Ej: Francia">
      </div>
      <div class="form-group">
        <label class="form-label">Máximo goleador real</label>
        <input type="text" id="admin-gr-goleador" placeholder="Ej: Mbappé">
      </div>
      <div class="form-group">
        <label class="form-label">Más asistencias real</label>
        <input type="text" id="admin-gr-asistencias" placeholder="Ej: Messi">
      </div>
      <div class="form-group">
        <label class="form-label">Sorpresa del Mundial real</label>
        <input type="text" id="admin-gr-sorpresa" placeholder="Ej: Japón">
      </div>
      <button class="btn-primary" onclick="saveAdminGeneral()">Guardar Predicciones Generales / Premio</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuRs-5zNt-ftpDDJBRLP4CH1ilLuz7J4M",
  authDomain: "quinela-barth.firebaseapp.com",
  projectId: "quinela-barth",
  storageBucket: "quinela-barth.firebasestorage.app",
  messagingSenderId: "340255110113",
  appId: "1:340255110113:web:7ca9b24e9ef69e7548d8a0",
  measurementId: "G-1YFYDMRFHF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const PLAYERS = ['Faride','Francisco','Nicole','Steven'];
const COLORS = {Faride:'#534AB7',Francisco:'#D85A30',Nicole:'#1D9E75',Steven:'#185FA5'};
const INITIALS = {Faride:'FA',Francisco:'FR',Nicole:'NI',Steven:'ST'};
const BG = {Faride:'#EEEDFE',Francisco:'#FAECE7',Nicole:'#E1F5EE',Steven:'#E6F1FB'};


const SEED = {
  matches: [
    {id:'m1',name:'Noruega vs Iraq',date:'16 Jun',done:true,result:'4-1',extraActive:true,extraMinuto:'28',extraJugador:'Haaland'}
  ],
  predictions: {
    'Faride':{'m1':{score:'2-1',minuto:'',jugador:''}},
    'Francisco':{'m1':{score:'3-1',minuto:'',jugador:''}},
    'Nicole':{'m1':{score:'4-1',minuto:'28',jugador:'Haaland'}},
    'Steven':{'m1':{score:'3-1',minuto:'',jugador:''}}
  },
  generalPredictions: {},
  generalResults: {campeon:'',subcampeon:'',goleador:'',asistencias:'',sorpresa:''},
  premio: 'Por definir'
};

let state;
let currentPlayer = '';
let partidosView = 'pendientes';

function cleanText(value) {
  return (value || '').toString().trim();
}

function sameText(a, b) {
  return cleanText(a).toLowerCase() === cleanText(b).toLowerCase();
}

function parseScore(score) {
  const parts = cleanText(score).split('-').map(x => parseInt(x, 10));
  if (parts.length !== 2 || Number.isNaN(parts[0]) || Number.isNaN(parts[1])) return null;
  return {a: parts[0], b: parts[1]};
}

function outcome(score) {
  const s = parseScore(score);
  if (!s) return '';
  if (s.a > s.b) return 'A';
  if (s.a < s.b) return 'B';
  return 'D';
}

function winnerHit(predScore, realScore) {
  const predOutcome = outcome(predScore);
  const realOutcome = outcome(realScore);
  return !!(predOutcome && realOutcome && predOutcome === realOutcome);
}

function minuteHit(predMinuto, realMinuto) {
  const pred = parseInt(cleanText(predMinuto), 10);
  const real = parseInt(cleanText(realMinuto), 10);
  if (Number.isNaN(pred) || Number.isNaN(real)) return false;
  return Math.abs(pred - real) <= 1;
}


function ensureStateShape() {
  if (!state.matches) state.matches = [];
  if (!state.predictions) state.predictions = {};
  PLAYERS.forEach(p => {
    if (!state.predictions[p]) state.predictions[p] = {};
  });
  if (!state.generalPredictions) state.generalPredictions = {};
  if (!state.generalResults) state.generalResults = {};
  ['campeon','subcampeon','goleador','asistencias','sorpresa'].forEach(k => {
    if (state.generalResults[k] === undefined) state.generalResults[k] = '';
  });
  if (!state.premio) state.premio = 'Por definir';
}

function generalComplete(gp) {
  return !!(gp && cleanText(gp.campeon) && cleanText(gp.subcampeon) && cleanText(gp.goleador) && cleanText(gp.asistencias) && cleanText(gp.sorpresa));
}

function generalHit(player, key) {
  const gp = (state.generalPredictions || {})[player] || {};
  const gr = state.generalResults || {};
  return !!(cleanText(gp[key]) && cleanText(gr[key]) && sameText(gp[key], gr[key]));
}

function generalValue(player, key) {
  const gp = (state.generalPredictions || {})[player] || {};
  return cleanText(gp[key]) || '—';
}

function resultBadge(player, key, pts) {
  return generalHit(player, key) ? ` <span class="general-hit">✅ +${pts}</span>` : '';
}

function buildGeneralSummary(player) {
  const gp = (state.generalPredictions || {})[player] || {};
  if (!generalComplete(gp)) {
    return `<div class="general-list">Predicciones generales: pendiente</div>`;
  }
  return `<div class="general-list">
    🏆 Campeón: ${generalValue(player,'campeon')}${resultBadge(player,'campeon',10)}<br>
    🥈 Subcampeón: ${generalValue(player,'subcampeon')}${resultBadge(player,'subcampeon',5)}<br>
    ⚽ Goleador: ${generalValue(player,'goleador')}${resultBadge(player,'goleador',5)}<br>
    🎯 Asistencias: ${generalValue(player,'asistencias')}${resultBadge(player,'asistencias',5)}<br>
    🌟 Sorpresa: ${generalValue(player,'sorpresa')}${resultBadge(player,'sorpresa',5)}
  </div>`;
}

function buildGeneralPredictionsBlock(player) {
  const gp = (state.generalPredictions || {})[player] || {};
  if (generalComplete(gp)) {
    return `<div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:0.75rem;color:#1a1a1a;">⭐ Predicciones Generales</div>
      <div class="general-saved">
        Guardadas ✓<br>
        🏆 Campeón: ${cleanText(gp.campeon)}<br>
        🥈 Subcampeón: ${cleanText(gp.subcampeon)}<br>
        ⚽ Máximo goleador: ${cleanText(gp.goleador)}<br>
        🎯 Más asistencias: ${cleanText(gp.asistencias)}<br>
        🌟 Sorpresa: ${cleanText(gp.sorpresa)}
      </div>
      <div style="font-size:11px;color:#bbb;margin-top:8px;">Ya no puedes editar tus predicciones generales</div>
    </div>`;
  }

  return `<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:0.75rem;color:#1a1a1a;">⭐ Predicciones Generales</div>
    <div class="form-group"><label class="form-label">Campeón</label><input type="text" id="gp-campeon" placeholder="Ej: Argentina" value="${cleanText(gp.campeon)}"></div>
    <div class="form-group"><label class="form-label">Subcampeón</label><input type="text" id="gp-subcampeon" placeholder="Ej: Francia" value="${cleanText(gp.subcampeon)}"></div>
    <div class="form-group"><label class="form-label">Máximo goleador</label><input type="text" id="gp-goleador" placeholder="Ej: Mbappé" value="${cleanText(gp.goleador)}"></div>
    <div class="form-group"><label class="form-label">Más asistencias</label><input type="text" id="gp-asistencias" placeholder="Ej: Messi" value="${cleanText(gp.asistencias)}"></div>
    <div class="form-group"><label class="form-label">Sorpresa del Mundial</label><input type="text" id="gp-sorpresa" placeholder="Ej: Japón" value="${cleanText(gp.sorpresa)}"></div>
    <button class="btn-primary" onclick="saveGeneralPredictions()">Guardar Predicciones Generales</button>
  </div>`;
}


function listenRealtime() {
  const ref = doc(db, "quiniela", "estado");

  onSnapshot(ref, (snap) => {
    if (snap.exists()) {
      state = snap.data();
      ensureStateShape();

      renderRanking();
      renderPartidos();
      renderPredecir();
    }
  });
}



async function loadState() {
  const ref = doc(db, "quiniela", "estado");

  const snap = await getDoc(ref);

  if (snap.exists()) {
    state = snap.data();
    ensureStateShape();
  } else {
    state = JSON.parse(JSON.stringify(SEED));
    ensureStateShape();
    await setDoc(ref, state);
  }

  try {
    currentPlayer = localStorage.getItem('quiniela_player') || '';

    if (currentPlayer) {
      document.getElementById('player-select').value = currentPlayer;
    }
  } catch(e) {}

  renderRanking();
  renderPartidos();
}



async function saveState() {
  ensureStateShape();
  const ref = doc(db, "quiniela", "estado");
  await setDoc(ref, state);
}


function savePlayer() {
  currentPlayer = document.getElementById('player-select').value;
  try { localStorage.setItem('quiniela_player', currentPlayer); } catch(e) {}
}

function calcPoints() {
  ensureStateShape();
  const pts = {Faride:0,Francisco:0,Nicole:0,Steven:0};

  state.matches.forEach(m => {
    if (!m.done || !m.result) return;
    PLAYERS.forEach(p => {
      const pred = (state.predictions[p]||{})[m.id];
      if (!pred) return;

      if (cleanText(pred.score) === cleanText(m.result)) pts[p] += 3;
      if (winnerHit(pred.score, m.result)) pts[p] += 1;
      if (m.extraActive && cleanText(m.extraMinuto) && cleanText(pred.minuto) && minuteHit(pred.minuto, m.extraMinuto)) pts[p] += 1;
      if (m.extraActive && cleanText(m.extraJugador) && cleanText(pred.jugador) && sameText(pred.jugador, m.extraJugador)) pts[p] += 1;
    });
  });

  const gr = state.generalResults || {};
  PLAYERS.forEach(p => {
    const gp = (state.generalPredictions || {})[p] || {};
    if (cleanText(gp.campeon) && cleanText(gr.campeon) && sameText(gp.campeon, gr.campeon)) pts[p] += 10;
    if (cleanText(gp.subcampeon) && cleanText(gr.subcampeon) && sameText(gp.subcampeon, gr.subcampeon)) pts[p] += 5;
    if (cleanText(gp.goleador) && cleanText(gr.goleador) && sameText(gp.goleador, gr.goleador)) pts[p] += 5;
    if (cleanText(gp.asistencias) && cleanText(gr.asistencias) && sameText(gp.asistencias, gr.asistencias)) pts[p] += 5;
    if (cleanText(gp.sorpresa) && cleanText(gr.sorpresa) && sameText(gp.sorpresa, gr.sorpresa)) pts[p] += 5;
  });

  return pts;
}

function renderRanking() {
  ensureStateShape();
  const pts = calcPoints();
  const sorted = PLAYERS.slice().sort((a,b) => pts[b]-pts[a]);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  let html = '';

  sorted.forEach((p,i) => {
    html += `<div class="ranking-item">
      <div class="rank-num">${medals[i]}</div>
      <div class="avatar" style="background:${BG[p]};color:${COLORS[p]};">${INITIALS[p]}</div>
      <div class="rank-name">${p}${buildGeneralSummary(p)}</div>
      <div style="text-align:right;">
        <div class="rank-pts">${pts[p]}</div>
        <div class="rank-pts-label">pts</div>
      </div>
    </div>`;
  });

  html += `<div style="border-top:1px solid #f0f0ec;margin-top:0.75rem;padding-top:1rem;">
    <div class="points-title">🏅 PREMIO</div>
    <div class="points-box">${cleanText(state.premio) || 'Por definir'}</div>
  </div>`;

  html += `<div style="border-top:1px solid #f0f0ec;margin-top:1rem;padding-top:1rem;">
    <div class="points-title">📋 Sistema de Puntos</div>
    <div class="points-box">
      <b>Partidos</b><br>
      ✅ Marcador exacto: +3 pts<br>
      ✅ Ganador del partido / empate: +1 pt<br>
      <span style="color:#888;">El punto de ganador también suma aunque pegues el marcador exacto.</span><br>
      ✅ Primer goleador: +1 pt<br>
      ✅ Minuto del primer gol: +1 pt <span style="color:#888;">(ventana ±1 min)</span><br><br>
      <b>Predicciones Generales</b><br>
      🏆 Campeón: +10 pts<br>
      🥈 Subcampeón: +5 pts<br>
      ⚽ Máximo goleador: +5 pts<br>
      🎯 Más asistencias: +5 pts<br>
      🌟 Sorpresa del Mundial: +5 pts
    </div>
  </div>`;

  document.getElementById('ranking-list').innerHTML = html;
}

function renderPartidos() {
  ensureStateShape();

  const pendingCount = state.matches.filter(m => !m.done).length;
  const doneCount = state.matches.filter(m => m.done).length;

  let html = `<div class="match-filter-tabs">
    <button class="match-filter-tab ${partidosView === 'pendientes' ? 'active' : ''}" onclick="setPartidosView('pendientes')">Pendientes (${pendingCount})</button>
    <button class="match-filter-tab ${partidosView === 'finalizados' ? 'active' : ''}" onclick="setPartidosView('finalizados')">Finalizados (${doneCount})</button>
  </div>`;

  let lastDate = '';

  if (!state.matches.length) {
    document.getElementById('partidos-list').innerHTML = html + '<div class="empty-state">No hay partidos aún. Agrégalos desde Admin.</div>';
    return;
  }

  const visibleMatches = state.matches.filter(m => {
    if (partidosView === 'pendientes') return !m.done;
    if (partidosView === 'finalizados') return m.done;
    return true;
  });

  if (!visibleMatches.length) {
    document.getElementById('partidos-list').innerHTML = html + `<div class="empty-state">${partidosView === 'pendientes' ? 'No hay partidos pendientes' : 'No hay partidos finalizados'}</div>`;
    return;
  }

  visibleMatches.forEach(m => {
    if (m.date !== lastDate) {
      html += `<div class="group-label">${m.date}</div>`;
      lastDate = m.date;
    }

    let predsHtml = '';

    PLAYERS.forEach(p => {
      const pred = (state.predictions[p]||{})[m.id];
      const scoreHit = m.done && pred && cleanText(pred.score) === cleanText(m.result);
      const winnerOnlyHit = m.done && pred && winnerHit(pred.score, m.result);
      const minutoHit = m.done && pred && m.extraActive && cleanText(m.extraMinuto) && cleanText(pred.minuto) && minuteHit(pred.minuto, m.extraMinuto);
      const jugadorHit = m.done && pred && m.extraActive && cleanText(m.extraJugador) && cleanText(pred.jugador) && sameText(pred.jugador, m.extraJugador);

      let extraHtml = '';
      if (m.extraActive && pred) {
        if (cleanText(pred.minuto)) {
          extraHtml += `<div class="pred-extra ${minutoHit ? 'pred-extra-hit' : ''}">${minutoHit ? '✅ +1 ' : ''}⏱ min ${cleanText(pred.minuto)}</div>`;
        }
        if (cleanText(pred.jugador)) {
          extraHtml += `<div class="pred-extra ${jugadorHit ? 'pred-extra-hit' : ''}">${jugadorHit ? '✅ +1 ' : ''}⚽ ${cleanText(pred.jugador)}</div>`;
        }
      }

      predsHtml += `<div class="pred-item ${scoreHit?'pred-hit':''}">
        <div class="pred-name">${p}</div>
        <div class="pred-score">${pred?cleanText(pred.score):'—'} ${scoreHit ? '✅ +3' : ''} ${winnerOnlyHit ? '✅ +1 ganador' : ''}</div>
        ${extraHtml}
      </div>`;
    });

    html += `<div class="match-card">
      <div class="match-header">
        <div class="match-title">${m.name}</div>
        <span class="match-status ${m.done?'status-done':'status-upcoming'}">${m.done?'Finalizado':'Pendiente'}</span>
      </div>
      <div class="predictions-grid">${predsHtml}</div>
      ${m.done&&m.result?`<div class="result-row"><span class="result-label">Resultado final:</span><span class="result-score">${m.result}</span></div>`:''}
      ${m.done&&m.extraActive&&(m.extraMinuto||m.extraJugador)?`<div class="result-row"><span class="result-label">Extras reales:</span><span class="result-score">${m.extraMinuto?`⏱ ${m.extraMinuto}`:''} ${m.extraJugador?`⚽ ${m.extraJugador}`:''}</span></div>`:''}
    </div>`;
  });

  document.getElementById('partidos-list').innerHTML = html;
}

function renderPredecir() {
  currentPlayer = document.getElementById('player-select').value;
  if (!currentPlayer) { document.getElementById('predecir-list').innerHTML = '<div class="empty-state">Selecciona tu nombre arriba</div>'; return; }
  ensureStateShape();
  const myPreds = state.predictions[currentPlayer]||{};
  const pending = state.matches.filter(m=>!m.done);
  let html = buildGeneralPredictionsBlock(currentPlayer);
  if (!pending.length) { html += '<div class="empty-state">No hay partidos pendientes por predecir</div>'; }
  else {
    let lastDate = '';
    pending.forEach(m => {
      if (m.date!==lastDate) { html+=`<div class="group-label">${m.date}</div>`; lastDate=m.date; }
      const already = myPreds[m.id];
      if (already) {
        let extraHtml = '';
        if (already.minuto) extraHtml += `<span class="tag tag-blue">⏱ min ${already.minuto}</span>`;
        if (already.jugador) extraHtml += `<span class="tag tag-blue">⚽ ${already.jugador}</span>`;
        html += `<div class="match-card">
          <div class="match-header"><div class="match-title">${m.name}</div><span class="match-status status-done">Guardado ✓</span></div>
          <div style="margin-top:0.5rem;"><span class="tag tag-green" style="font-size:14px;padding:5px 14px;">${already.score}</span>${extraHtml}</div>
          <div style="font-size:11px;color:#bbb;margin-top:8px;">Ya no puedes editar tu predicción</div>
        </div>`;
      } else {
        html += `<div class="match-card">
          <div class="match-header"><div class="match-title">${m.name}</div></div>
          <div class="form-group" style="margin-top:0.75rem;">
            <label class="form-label">Marcador</label>
            <div class="form-row">
              <input type="number" min="0" max="20" class="score-input" id="sa-${m.id}" placeholder="0">
              <span class="score-sep">—</span>
              <input type="number" min="0" max="20" class="score-input" id="sb-${m.id}" placeholder="0">
            </div>
          </div>
          ${m.extraActive?`<div class="extra-section">
            <div class="extra-title">⭐ Puntos extra (opcional)</div>
            <div class="form-group"><label class="form-label">Minuto del primer gol</label><input type="number" min="1" max="120" id="em-${m.id}" placeholder="ej: 28"></div>
            <div class="form-group" style="margin-bottom:0;"><label class="form-label">Jugador que anota primero</label><input type="text" id="ej-${m.id}" placeholder="ej: Haaland"></div>
          </div>`:''}
          <button class="btn-primary" onclick="submitPred('${m.id}')">Guardar predicción</button>
        </div>`;
      }
    });
  }
  document.getElementById('predecir-list').innerHTML = html;
}

function submitPred(matchId) {
  const a = document.getElementById('sa-'+matchId);
  const b = document.getElementById('sb-'+matchId);
  if (!a||!b||a.value===''||b.value==='') { showToast('Ingresa el marcador completo'); return; }
  const score = `${a.value}-${b.value}`;
  const minEl = document.getElementById('em-'+matchId);
  const jugEl = document.getElementById('ej-'+matchId);
  if (!state.predictions[currentPlayer]) state.predictions[currentPlayer]={};
  state.predictions[currentPlayer][matchId] = {score, minuto:minEl?minEl.value.trim():'', jugador:jugEl?jugEl.value.trim():''};
  saveState();
  showToast('¡Predicción guardada!');
  renderPredecir(); renderPartidos(); renderRanking();
}

function renderAdminMatchSelect() {
  const sel = document.getElementById('admin-match-select');
  sel.innerHTML = '<option value="">Elige un partido...</option>';
  state.matches.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = `${m.name} (${m.date})${m.done?' ✓':''}`;
    sel.appendChild(opt);
  });
}

function renderAdminMatch() {
  const matchId = document.getElementById('admin-match-select').value;
  const el = document.getElementById('admin-match-detail');
  if (!matchId) { el.innerHTML=''; return; }
  const m = state.matches.find(x=>x.id===matchId);
  el.innerHTML = `<div style="margin-top:1rem;">
    <div style="font-size:13px;font-weight:600;margin-bottom:0.75rem;color:#1a1a1a;">${m.name}</div>
    <div class="form-group"><label class="form-label">Resultado final</label>
      <div class="form-row">
        <input type="number" min="0" max="20" class="score-input" id="adm-a" value="${m.result?m.result.split('-')[0]:''}" placeholder="0">
        <span class="score-sep">—</span>
        <input type="number" min="0" max="20" class="score-input" id="adm-b" value="${m.result?m.result.split('-')[1]:''}" placeholder="0">
      </div>
    </div>
    <div class="form-group"><label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
      <input type="checkbox" id="adm-extra" ${m.extraActive?'checked':''} onchange="toggleAdminExtra()">
      <span>Activar puntos extra para este partido</span>
    </label></div>
    <div id="adm-extra-fields" style="${m.extraActive?'':'display:none;'}">
      <div class="extra-section">
        <div class="extra-title">Puntos extra</div>
        <div class="form-group"><label class="form-label">Minuto del primer gol</label><input type="text" id="adm-minuto" value="${m.extraMinuto||''}" placeholder="ej: 28"></div>
        <div class="form-group" style="margin-bottom:0;"><label class="form-label">Jugador que anotó primero</label><input type="text" id="adm-jugador" value="${m.extraJugador||''}" placeholder="ej: Haaland"></div>
      </div>
    </div>
    <button class="btn-primary" onclick="saveAdminMatch('${matchId}')">Guardar resultado</button>
<button 
  class="btn-primary" 
  style="background:#d9534f;margin-top:0.5rem;" 
  onclick="deleteMatch('${matchId}')">
  Eliminar partido
</button>
  </div>`;
}

function toggleAdminExtra() {
  document.getElementById('adm-extra-fields').style.display = document.getElementById('adm-extra').checked?'':'none';
}

function saveAdminMatch(matchId) {
  const a = document.getElementById('adm-a').value;
  const b = document.getElementById('adm-b').value;
  if (a===''||b==='') { showToast('Ingresa el resultado'); return; }
  const m = state.matches.find(x=>x.id===matchId);
  m.result=`${a}-${b}`; m.done=true;
  m.extraActive=document.getElementById('adm-extra').checked;
  m.extraMinuto=document.getElementById('adm-minuto')?document.getElementById('adm-minuto').value.trim():'';
  m.extraJugador=document.getElementById('adm-jugador')?document.getElementById('adm-jugador').value.trim():'';
  saveState();
  showToast('¡Resultado guardado!');
  renderRanking(); renderPartidos(); renderAdminMatchSelect();
}

function addMatch() {
  const name = document.getElementById('new-match-name').value.trim();
  const date = document.getElementById('new-match-date').value.trim();
  if (!name||!date) { showToast('Ingresa nombre y fecha'); return; }
  state.matches.push({id:'m'+Date.now(),name,date,done:false,result:'',extraActive:true,extraMinuto:'',extraJugador:''});
  saveState();
  document.getElementById('new-match-name').value='';
  document.getElementById('new-match-date').value='';
  showToast('¡Partido agregado!');
  renderPartidos(); renderPredecir(); renderAdminMatchSelect();
}

function setPartidosView(view) {
  partidosView = view;
  renderPartidos();
}

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.tab')[['ranking','partidos','predecir','admin'].indexOf(tab)].classList.add('active');
  if (tab==='ranking') renderRanking();
  if (tab==='partidos') renderPartidos();
  if (tab==='predecir') renderPredecir();
  if (tab==='admin') { renderAdminMatchSelect(); renderAdminGeneral(); document.getElementById('admin-match-detail').innerHTML=''; }
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function saveGeneralPredictions() {
  ensureStateShape();
  currentPlayer = document.getElementById('player-select').value;

  if (!currentPlayer) {
    showToast('Selecciona tu nombre primero');
    return;
  }

  const values = {
    campeon: cleanText(document.getElementById('gp-campeon')?.value),
    subcampeon: cleanText(document.getElementById('gp-subcampeon')?.value),
    goleador: cleanText(document.getElementById('gp-goleador')?.value),
    asistencias: cleanText(document.getElementById('gp-asistencias')?.value),
    sorpresa: cleanText(document.getElementById('gp-sorpresa')?.value)
  };

  if (!values.campeon || !values.subcampeon || !values.goleador || !values.asistencias || !values.sorpresa) {
    showToast('Completa todas las predicciones generales');
    return;
  }

  if (!state.generalPredictions) state.generalPredictions = {};
  state.generalPredictions[currentPlayer] = values;

  await saveState();
  showToast('Predicciones generales guardadas');
  renderPredecir();
  renderRanking();
}

function renderAdminGeneral() {
  ensureStateShape();
  const gr = state.generalResults || {};

  const premio = document.getElementById('admin-premio');
  if (!premio) return;

  premio.value = cleanText(state.premio) || 'Por definir';
  document.getElementById('admin-gr-campeon').value = cleanText(gr.campeon);
  document.getElementById('admin-gr-subcampeon').value = cleanText(gr.subcampeon);
  document.getElementById('admin-gr-goleador').value = cleanText(gr.goleador);
  document.getElementById('admin-gr-asistencias').value = cleanText(gr.asistencias);
  document.getElementById('admin-gr-sorpresa').value = cleanText(gr.sorpresa);
}

async function saveAdminGeneral() {
  ensureStateShape();

  state.premio = cleanText(document.getElementById('admin-premio').value) || 'Por definir';
  state.generalResults = {
    campeon: cleanText(document.getElementById('admin-gr-campeon').value),
    subcampeon: cleanText(document.getElementById('admin-gr-subcampeon').value),
    goleador: cleanText(document.getElementById('admin-gr-goleador').value),
    asistencias: cleanText(document.getElementById('admin-gr-asistencias').value),
    sorpresa: cleanText(document.getElementById('admin-gr-sorpresa').value)
  };

  await saveState();
  showToast('Generales / Premio guardados');
  renderRanking();
  renderAdminGeneral();
}

async function deleteMatch(matchId) {

  const confirmDelete = confirm(
    '¿Seguro que quieres eliminar este partido?'
  );

  if (!confirmDelete) return;

  // eliminar partido
  state.matches = state.matches.filter(
    m => m.id !== matchId
  );

  // eliminar predicciones relacionadas
  PLAYERS.forEach(player => {
    if (
      state.predictions[player] &&
      state.predictions[player][matchId]
    ) {
      delete state.predictions[player][matchId];
    }
  });

  await saveState();

  showToast('Partido eliminado');

  renderPartidos();
  renderRanking();
  renderPredecir();
  renderAdminMatchSelect();

  document.getElementById(
    'admin-match-detail'
  ).innerHTML = '';
}
window.showTab = showTab;
window.submitPred = submitPred;
window.savePlayer = savePlayer;
window.renderPredecir = renderPredecir;
window.renderAdminMatch = renderAdminMatch;
window.toggleAdminExtra = toggleAdminExtra;
window.saveAdminMatch = saveAdminMatch;
window.addMatch = addMatch;
window.deleteMatch = deleteMatch;
window.setPartidosView = setPartidosView;
window.saveGeneralPredictions = saveGeneralPredictions;
window.saveAdminGeneral = saveAdminGeneral;

loadState().then(() => {
  listenRealtime();
  renderPredecir();
  renderAdminMatchSelect();
  renderAdminGeneral();
});

</script>
</body>
</html>
